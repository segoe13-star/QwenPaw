# Build QwenPaw Desktop:
# - Legacy desktop: Windows (conda-pack + NSIS), macOS (conda-pack -> .app)
# - Tauri desktop: Windows/macOS app bundles with PyInstaller backend sidecar
# Runs on release publish and manual dispatch.

name: QwenPaw Desktop Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_to_oss:
        description: 'Upload to OSS'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-tauri-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content src/qwenpaw/__version__.py -Raw
          if ($content -match '__version__\s*=\s*"([^"]+)"') {
            $v = $Matches[1]
          } else {
            throw "Failed to extract version from __version__.py"
          }
          "version<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $v | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      - name: Clean dist directory
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item -Recurse -Force dist
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build Tauri Windows package
        shell: pwsh
        run: ./scripts/pack-tauri/build_win_pyinstaller.ps1

      - name: Stage Tauri Windows installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem "console/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No Tauri Windows installer found"
          }
          $target = "dist/QwenPaw-Tauri-${{ steps.version.outputs.version }}-Windows-setup.exe"
          Copy-Item -Force $installer.FullName $target
          Write-Host "Staged Tauri Windows installer: $target"

      - name: Upload Tauri Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QwenPaw-Desktop-Tauri-Windows-${{ steps.version.outputs.version }}
          path: dist/QwenPaw-Tauri-*-Windows-setup.exe


  upload-release:
    needs: [build-tauri-windows]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Move artifacts to root for upload
        run: |
          mv QwenPaw-Desktop-Windows-*/QwenPaw-Setup-*.exe . 2>/dev/null || true
          mv QwenPaw-Desktop-macOS-*/QwenPaw-*.zip . 2>/dev/null || true
          mv QwenPaw-Desktop-Tauri-Windows-*/QwenPaw-Tauri-*-Windows-setup.exe . 2>/dev/null || true
          mv QwenPaw-Desktop-Tauri-macOS-*/QwenPaw-Tauri-*-macOS.zip . 2>/dev/null || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            QwenPaw-Setup-*.exe
            QwenPaw-[0-9]*-macOS.zip
            QwenPaw-Tauri-*-Windows-setup.exe
            QwenPaw-Tauri-*-macOS.zip
          fail-on-unmatched-files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
